# Read-only `terragrunt run --all plan` on every PR (ADR-020). Assumes the management gha-plan
# OIDC role, which chains into each member's read-only watch-ci-plan role (never admin) — plan
# can never mutate an account. Fork PRs get no OIDC id-token from GitHub, so only trusted-branch
# PRs run this. Locking is skipped (TF_CLI_ARGS_plan=-lock=false) so the read-only role needs no
# state-lock write; plan never persists state.
name: terragrunt plan

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write # request the OIDC token to assume the AWS role
  contents: read

concurrency:
  group: tg-plan-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  TG_TF_PATH: tofu
  TF_CLI_ARGS_plan: "-lock=false" # read-only plan: no lock-table write needed
  # Plan assumes the READ-ONLY member role (ADR-020); apply uses the default admin role.
  WATCH_MEMBER_ROLE_NAME: watch-ci-plan
  WATCH_NONPROD_ACCOUNT_ID: ${{ secrets.WATCH_NONPROD_ACCOUNT_ID }}
  WATCH_PROD_ACCOUNT_ID: ${{ secrets.WATCH_PROD_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
  OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

jobs:
  # Topology routing contract (platform#50): the same Terratest matrix the pre-commit hook runs.
  # Render-level and read-only (fake member ids; only STS GetCallerIdentity on the plan role), so
  # it needs no member access at all — it guards the three-topology contract on every PR.
  topology-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_PLAN_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install Terragrunt
        run: |
          curl -sSL -o /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v1.0.8/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: test/go.sum

      - name: Topology routing contract (Terratest)
        working-directory: test
        run: go test -run 'TestTopologyRouting|TestProjectRenameKnob' -v -timeout 15m

      # ADR-044: the IAM policies are what a security team signed off on, and the permissions-boundary
      # fence is what makes the provisioner safe to hand them. Both re-proved on every PR.
      - name: IAM policy + boundary fence
        run: scripts/policy-check.sh

  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_PLAN_ROLE_ARN }}
          aws-region: us-east-1

      # Single-source the tofu version off .opentofu-version so CI and the local scripts can't drift
      # (a silent bump to 1.12 broke cross-account destroy; #46). Change the pin in ONE file.
      - name: Read pinned OpenTofu version
        id: tofu-pin
        run: echo "version=$(tr -d ' \t\n' < .opentofu-version)" >> "$GITHUB_OUTPUT"
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ steps.tofu-pin.outputs.version }}
          tofu_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sSL -o /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v1.0.8/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: terragrunt run --all plan (estate)
        working-directory: watch/us-east-1
        run: terragrunt run --all plan --non-interactive
